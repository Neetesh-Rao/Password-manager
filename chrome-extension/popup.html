<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Vault Autofill</title>
  <style>
    body {
      width: 250px;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #000;
      color: #fff;
      margin: 0;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 15px;
    }
    .header img {
      width: 24px;
      height: 24px;
    }
    .header h1 {
      font-size: 16px;
      margin: 0;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .status {
      font-size: 13px;
      color: #A1A1AA;
      background: #18181B;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #27272A;
      margin-bottom: 15px;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      font-size: 13px;
    }
    .btn:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon-192.png" alt="Vault">
    <h1>Vault Autofill</h1>
  </div>
  
  <div class="status" id="status-msg">
    Checking connection to Vault...
  </div>

  <a id="dashboard-link" href="https://passwordvert.vercel.app" target="_blank" class="btn">Open Vault Dashboard</a>

  <script src="popup.js"></script>
</body>
</html>
